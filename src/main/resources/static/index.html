<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entity Generator</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Arial, sans-serif;
      line-height: 1.5;
      color: #1f2933;
      background: #f5f7fa;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #f5f7fa;
    }

    main {
      max-width: 560px;
      margin: 0 auto;
      padding: 48px 20px;
    }

    .panel {
      background: #ffffff;
      border: 1px solid #d9e2ec;
      border-radius: 8px;
      padding: 24px;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.5rem;
    }

    p {
      margin: 0 0 24px;
      color: #52606d;
    }

    form {
      display: grid;
      gap: 16px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    label {
      font-weight: 600;
    }

    input,
    select,
    button {
      font: inherit;
    }

    input[type="file"],
    select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #bcccdc;
      border-radius: 6px;
      background: #ffffff;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 6px;
      padding: 11px 16px;
      background: #1565c0;
      color: #ffffff;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover:enabled {
      background: #0d57aa;
    }

    button:disabled {
      opacity: 0.7;
      cursor: wait;
    }

    .status {
      min-height: 24px;
      margin-top: 16px;
      font-size: 0.95rem;
    }

    .status[data-state="loading"] {
      color: #1565c0;
    }

    .status[data-state="success"] {
      color: #1b7f3b;
    }

    .status[data-state="error"] {
      color: #b42318;
    }
  </style>
</head>
<body>
  <main>
    <section class="panel">
      <h1>Entity Generator</h1>
      <p>Upload a source file, choose the target language, and download the generated entity file.</p>

      <form id="generator-form" enctype="multipart/form-data">
        <div class="field">
          <label for="source-file">Source file</label>
          <input id="source-file" name="file" type="file" required>
        </div>

        <div class="field">
          <label for="target-language">Target language</label>
          <select id="target-language" name="language" required>
            <option value="java">Java</option>
            <option value="go">Go</option>
          </select>
        </div>

        <button id="submit-button" type="submit">Generate entity</button>
      </form>

      <div id="status" class="status" role="status" aria-live="polite"></div>
    </section>
  </main>

  <script>
    (function () {
      const form = document.getElementById('generator-form');
      const fileInput = document.getElementById('source-file');
      const languageSelect = document.getElementById('target-language');
      const submitButton = document.getElementById('submit-button');
      const status = document.getElementById('status');

      function setStatus(message, state) {
        status.textContent = message || '';
        if (state) {
          status.dataset.state = state;
        } else {
          delete status.dataset.state;
        }
      }

      function setSubmitting(isSubmitting) {
        fileInput.disabled = isSubmitting;
        languageSelect.disabled = isSubmitting;
        submitButton.disabled = isSubmitting;
        submitButton.textContent = isSubmitting ? 'Generating...' : 'Generate entity';
      }

      function getFilenameFromDisposition(disposition) {
        if (!disposition) {
          return '';
        }

        const utf8Match = disposition.match(/filename\*=UTF-8''([^;]+)/i);
        if (utf8Match && utf8Match[1]) {
          return decodeURIComponent(utf8Match[1]);
        }

        const plainMatch = disposition.match(/filename="?([^";]+)"?/i);
        return plainMatch && plainMatch[1] ? plainMatch[1] : '';
      }

      async function readErrorMessage(response) {
        const contentType = response.headers.get('content-type') || '';

        if (contentType.includes('application/json')) {
          try {
            const payload = await response.json();
            return payload.message || payload.error || 'Request failed.';
          } catch (jsonError) {
            return 'Request failed.';
          }
        }

        const text = await response.text();
        return text || 'Request failed.';
      }

      form.addEventListener('submit', async function (event) {
        event.preventDefault();

        const file = fileInput.files && fileInput.files[0];
        if (!file) {
          setStatus('Please select a file.', 'error');
          return;
        }

        const formData = new FormData();
        formData.append('file', file);
        formData.append('language', languageSelect.value);

        setSubmitting(true);
        setStatus('Uploading file and generating entity...', 'loading');

        try {
          const response = await fetch('/api/entities/generate', {
            method: 'POST',
            body: formData
          });

          if (!response.ok) {
            const message = await readErrorMessage(response);
            throw new Error(message);
          }

          const blob = await response.blob();
          const disposition = response.headers.get('content-disposition');
          const filename = getFilenameFromDisposition(disposition) || 'entity.txt';
          const url = URL.createObjectURL(blob);
          const link = document.createElement('a');

          link.href = url;
          link.download = filename;
          document.body.appendChild(link);
          link.click();
          link.remove();
          URL.revokeObjectURL(url);

          setStatus('Entity generated. Your download should start automatically.', 'success');
        } catch (error) {
          setStatus(error && error.message ? error.message : 'Unable to generate entity.', 'error');
        } finally {
          setSubmitting(false);
        }
      });
    }());
  </script>
</body>
</html>
